<!DOCTYPE html>
<html>
<head>
<title>JavaScript Functions Demo</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:8px;
max-width:800px;
margin:auto;
}

button{
padding:10px 15px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#output{
margin-top:20px;
background:#eee;
padding:15px;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>JavaScript Array and Object Functions</h1>

<button onclick="runFunctions()">Show Output</button>

<div id="output"></div>

</div>

<script>

// 1. Scope example
function scopeExample(){
var a = "I am var";
let b = "I am let";
const c = "I am const";

return "var → function scoped\nlet → block scoped\nconst → block scoped";
}


// 2. Fruits array
const fruits = ["Apple","Banana","Mango","Orange","Grapes"];

function getSecondFruit(){
return fruits[1];
}


// 3. push and pop
function modifyArray(arr){
arr.push("NewFruit");
arr.pop();
return arr;
}


// 4. map square numbers
function squareNumbers(nums){
return nums.map(num => num * num);
}


// 5. filter odd numbers
function filterOdd(nums){
return nums.filter(num => num % 2 !== 0);
}


// 6. person object greeting
const person = {
name:"Rahul",
age:25,
occupation:"Developer"
};

function greetPerson(){
return "Hello my name is " + person.name +
". I am " + person.age +
" years old and I work as a " + person.occupation + ".";
}


// 7. rectangle area
function rectangleArea(rect){
return rect.width * rect.height;
}


// 8. object keys
function getObjectKeys(obj){
return Object.keys(obj);
}


// 9. merge objects
function mergeObjects(obj1,obj2){
return Object.assign({},obj1,obj2);
}


// 10. reduce sum
function sumNumbers(nums){
return nums.reduce((total,num)=> total + num,0);
}


// Run all
function runFunctions(){

let output="";

//1
output += "1. Scope Difference:\n" + scopeExample() + "\n\n";

//2
output += "2. Fruits Array: " + fruits + "\n";
output += "Second Fruit: " + getSecondFruit() + "\n\n";

//3
let arr=[1,2,3,4];
output += "3. Original Array: " + arr + "\n";
output += "Modified Array: " + modifyArray(arr) + "\n\n";

//4
let nums=[1,2,3,4,5];
output += "4. Numbers: " + nums + "\n";
output += "Squared Numbers: " + squareNumbers(nums) + "\n\n";

//5
output += "5. Odd Numbers from " + nums + ": " + filterOdd(nums) + "\n\n";

//6
output += "6. Person Object Greeting:\n" + greetPerson() + "\n\n";

//7
let rectangle={width:5,height:10};
output += "7. Rectangle Input: width=5, height=10\n";
output += "Area: " + rectangleArea(rectangle) + "\n\n";

//8
let obj={a:1,b:2,c:3};
output += "8. Object: " + JSON.stringify(obj) + "\n";
output += "Keys: " + getObjectKeys(obj) + "\n\n";

//9
let obj1={name:"John"};
let obj2={age:30};
output += "9. Object1: " + JSON.stringify(obj1) + "\n";
output += "Object2: " + JSON.stringify(obj2) + "\n";
output += "Merged Object: " + JSON.stringify(mergeObjects(obj1,obj2)) + "\n\n";

//10
output += "10. Sum of Numbers " + nums + ": " + sumNumbers(nums);

document.getElementById("output").innerText = output;

}

</script>

</body>
</html>
