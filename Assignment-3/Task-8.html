<!DOCTYPE html>
<html>
<head>

<style>
body{
font-family:Arial;
text-align:center;
background:#f8f8f8;
padding:40px;
}

input{
padding:10px;
}

button{
padding:10px 20px;
background:#2196F3;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>Repeated Digit Sum</h2>

<input type="number" id="number" placeholder="Enter number">

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

<script>

function calculate(){

let num = document.getElementById("number").value;

while(num > 9){

num = num
.toString()
.split('')
.reduce((sum,digit)=>sum + Number(digit),0);

}

document.getElementById("result").innerText = num;

}

</script>

</body>
</html>
