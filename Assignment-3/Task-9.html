<!DOCTYPE html>
<html>
<head>

<style>
body{
font-family:Arial;
text-align:center;
background:#f0fff0;
padding:40px;
}

textarea{
width:300px;
height:120px;
padding:10px;
}

button{
padding:10px 20px;
background:#009688;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>Paragraph Word Counter</h2>

<textarea id="text"></textarea>

<br><br>

<button onclick="countWords()">Count Words</button>

<h3 id="result"></h3>

<script>

function countWords(){

const text = document.getElementById("text").value;

const words = text.trim().split(/\s+/);

document.getElementById("result").innerText =
"Words: " + words.length;

}

</script>

</body>
</html>
