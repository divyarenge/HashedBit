<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Average Scores</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    width:400px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    border:none;
    background:#667eea;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#5a67d8;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

th{
    background:#667eea;
    color:white;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Average Scores</h2>

<button onclick="calculateAverage()">Calculate Average</button>

<table id="resultTable">
<thead>
<tr>
<th>Name</th>
<th>Average</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const students = [
{ name: "Ram", scores: [80, 70, 60] },
{ name: "Mohan", scores: [80, 70, 90] },
{ name: "Sai", scores: [60, 70, 80] },
{ name: "Hemang", scores: [90, 90, 80, 80] }
];

function calculateAverage(){

const result = students.map(student => {

const total = student.scores.reduce((sum,score)=> sum + score,0);

const avg = total / student.scores.length;

return {
name: student.name,
average: avg
};

});

display(result);

}

function display(data){

const tbody = document.querySelector("#resultTable tbody");
tbody.innerHTML="";

data.forEach(item=>{
const row = `<tr>
<td>${item.name}</td>
<td>${item.average}</td>
</tr>`;

tbody.innerHTML += row;
});

}

</script>

</body>
</html>
