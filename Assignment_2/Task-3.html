<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Tax Calculator</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #b5ccf7, #b0c3e5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #ffffff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        text-align: center;
        width: 400px;
    }

    h1 {
        margin-bottom: 10px;
        color: #2a5298;
    }

    p {
        color: #555;
        margin-bottom: 25px;
        font-size: 14px;
    }

    input {
        width: 90%;
        padding: 12px;
        margin-bottom: 20px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        background: #2a5298;
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #304175;
    }

    .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: #333;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Salary Tax Calculator</h1>
    <p>Calculate your tax based on your annual salary</p>
    
    <input type="number" id="salary" placeholder="Enter your salary">
    <br>
    <button onclick="calculateTax()">Calculate Tax</button>

    <div class="result" id="output"></div>
</div>

<script>
    function findTax(salary) {
        let tax = 0;

        switch (true) {
            case (salary > 0 && salary <= 500000):
                tax = 0;
                break;

            case (salary > 500000 && salary <= 1000000):
                tax = salary * 0.10;
                break;

            case (salary > 1000000 && salary <= 1500000):
                tax = salary * 0.20;
                break;

            case (salary > 1500000):
                tax = salary * 0.30;
                break;

            default:
                tax = "Invalid Salary";
        }

        return tax;
    }

    function calculateTax() {
        let salaryInput = document.getElementById("salary").value;
        let salary = Number(salaryInput);

        let result = findTax(salary);

        if (result === "Invalid Salary") {
            document.getElementById("output").innerHTML = result;
        } else {
            document.getElementById("output").innerHTML = 
                "Tax Amount: ₹ " + result.toFixed(2);
        }
    }
</script>

</body>
</html>
