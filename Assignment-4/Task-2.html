<!DOCTYPE html>
<html>
<head>
<title>Create Div Task</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:40px;
background:#f5f5f5;
}

#container{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.box{
display:flex;
align-items:center;
justify-content:center;
background:#4CAF50;
color:white;
border-radius:6px;
}

button{
padding:10px 20px;
background:#333;
color:white;
border:none;
cursor:pointer;
margin:5px;
}

</style>
</head>

<body>

<h2>Create Div Example</h2>

<button onclick="createDiv(200,100,'Hello Students')">Create Div 1</button>
<button onclick="createDiv(150,80,'HashedBit Student')">Create Div 2</button>

<div id="container"></div>

<script>

function createDiv(width, height, text){

const div = document.createElement("div");

div.style.width = width + "px";
div.style.height = height + "px";

div.className = "box";

div.textContent = text;

document.getElementById("container").appendChild(div);

}

</script>

</body>
</html>
